<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Wholesale Order | NAYNA</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #0f766e; --primary-dark: #0d9488;
            --surface: #ffffff; --bg: #f3f4f6;
            --text: #111827; --border: #e5e7eb; --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 4rem; }
        
        .nav { background: white; padding: 1rem 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; }
        .logo { font-weight: 800; font-size: 1.5rem; color: var(--primary); text-decoration: none; }
        .back-link { font-size: 0.9rem; color: #6b7280; text-decoration: none; }

        .layout { display: grid; grid-template-columns: 1fr 400px; gap: 2rem; max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; align-items: start; }
        .form-card { background: var(--surface); padding: 2.5rem; border-radius: var(--radius); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .section-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--bg); }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; color: #374151; }
        input, textarea { width: 100%; padding: 0.85rem; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; background: #f9fafb; }
        input:focus, textarea:focus { outline: none; border-color: var(--primary); background: white; }
        
        /* Product Selection List */
        .product-select-grid { display: grid; gap: 0.75rem; }
        .product-option { border: 1px solid var(--border); padding: 1rem; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 1rem; transition: 0.2s; background: white; }
        .product-option:hover { border-color: var(--primary-dark); background: #f0fdfa; }
        .product-option.selected { border-color: var(--primary); background: #f0fdfa; box-shadow: 0 0 0 2px var(--primary); }
        .radio-circle { width: 20px; height: 20px; border: 2px solid #d1d5db; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .product-option.selected .radio-circle { border-color: var(--primary); }
        .product-option.selected .radio-circle::after { content: ''; width: 10px; height: 10px; background: var(--primary); border-radius: 50%; }

        /* Summary Sidebar */
        .summary-card { background: white; padding: 2rem; border-radius: var(--radius); position: sticky; top: 6rem; border: 1px solid var(--border); }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 1rem; font-size: 0.9rem; color: #6b7280; }
        .summary-total { border-top: 1px solid var(--border); margin-top: 1rem; padding-top: 1rem; display: flex; justify-content: space-between; font-weight: 700; font-size: 1.1rem; color: var(--text); }
        .btn-submit { width: 100%; padding: 1rem; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 1rem; margin-top: 1.5rem; transition: 0.2s; }
        .btn-submit:hover { background: var(--primary-dark); }
        .btn-submit:disabled { background: #9ca3af; cursor: not-allowed; }

        @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } .summary-card { position: static; order: -1; margin-bottom: 2rem; } }
    </style>
</head>
<body>

    <nav class="nav">
        <a href="index.html" class="logo">NAYNA</a>
        <a href="index.html" class="back-link">← Cancel & Return</a>
    </nav>

    <div class="layout">
        <div class="form-card">
            <form id="order-form">
                <div class="section-title">1. Select Product</div>
                
                <div class="form-group product-select-grid" id="product-list">
                    <div style="padding:1rem; text-align:center; color:#666;">Loading products...</div>
                </div>

                <div class="section-title" style="margin-top: 2rem;">2. Order Details</div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Quantity (Min 48)</label>
                        <input type="number" id="quantity" value="48" min="48" step="10" required oninput="updateSummary()">
                    </div>
                    <div class="form-group">
                        <label>Contact Person</label>
                        <input type="text" id="contact-person" placeholder="John Doe" required>
                    </div>
                </div>

                <div class="section-title" style="margin-top: 2rem;">3. Shipping Info</div>
                <div class="form-group">
                    <label>Business Name</label>
                    <input type="text" id="business-name" required>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="phone" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Delivery Address</label>
                    <textarea id="address" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="notes" rows="2"></textarea>
                </div>

                <button type="submit" class="btn-submit">Submit Wholesale Order</button>
            </form>
        </div>

        <div class="summary-card">
            <h3 style="margin-bottom: 1.5rem;">Order Summary</h3>
            <div class="summary-item">
                <span>Product</span>
                <span id="sum-prod" style="font-weight:600; color:var(--primary)">-</span>
            </div>
            <div class="summary-item">
                <span>Quantity</span>
                <span id="sum-qty">50 units</span>
            </div>
            <div class="summary-total">
                <span>Status</span>
                <span>Quote Request</span>
            </div>
            <div style="margin-top:1.5rem; font-size:0.8rem; color:#6b7280; background:#f9fafb; padding:1rem; border-radius:8px">
                Your order is secure. We will contact you within 24 hours to confirm shipping costs.
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ljfxvbdpuyuhhnkxjtcc.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_Iiaz5ETd_cnZwLBvUtJuMw_IqTVxwmr'; // PASTE YOUR KEY HERE

        // ==========================================
        // 2. PRODUCT DATA
        // ==========================================
        const products = [
            { id: 'dishwash-gel-700g', name: 'Dishwash Gel 700g' },
            { id: 'dishwash-gel-400g', name: 'Dishwash Gel 400g' },
            { id: 'dishwash-soap', name: 'Dishwash Soap Bar' },
            { id: 'stainless-scrubber', name: 'Stainless Steel Scrubber' },
            { id: 'plastic-scrubber', name: 'Plastic Scrubber' }
        ];

        let currentId = products[0].id; // Default to first product

        // ==========================================
        // 3. INITIALIZATION (Runs when page loads)
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            console.log("Initializing Order Page...");
            
            // A. Get Product ID from URL
            const params = new URLSearchParams(window.location.search);
            const urlId = params.get('product');

            // B. Validate ID
            if (urlId && products.some(p => p.id === urlId)) {
                currentId = urlId;
            }

            // C. Render the Product List
            renderProductList();
            
            // D. Update Summary
            updateSummary();
        });

        function renderProductList() {
            const listContainer = document.getElementById('product-list');
            if (!listContainer) return;

            listContainer.innerHTML = ''; // Clear loading text

            products.forEach(p => {
                const div = document.createElement('div');
                div.className = 'product-option';
                
                // If this matches currentId, mark as selected
                if (p.id === currentId) {
                    div.classList.add('selected');
                }
                
                // Add click handler
                div.onclick = () => selectProduct(p.id, div);
                
                div.innerHTML = `
                    <div class="radio-circle"></div>
                    <div>
                        <div style="font-weight:600">${p.name}</div>
                    </div>
                `;
                listContainer.appendChild(div);
            });
        }

        function selectProduct(id, element) {
            // Unselect all
            document.querySelectorAll('.product-option').forEach(el => el.classList.remove('selected'));
            // Select clicked
            element.classList.add('selected');
            // Update state
            currentId = id;
            updateSummary();
        }

        function updateSummary() {
            const productObj = products.find(p => p.id === currentId);
            const qty = document.getElementById('quantity').value;
            
            if (productObj) {
                document.getElementById('sum-prod').innerText = productObj.name;
            }
            document.getElementById('sum-qty').innerText = qty + " units";
        }

        // ==========================================
        // 4. SUPABASE SUBMISSION
        // ==========================================
        document.getElementById('order-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.querySelector('.btn-submit');
            const originalText = btn.innerText;
            
            btn.innerText = "Processing...";
            btn.disabled = true;

            const formData = {
                product_id: currentId,
                quantity: document.getElementById('quantity').value,
                contact_person: document.getElementById('contact-person').value,
                business_name: document.getElementById('business-name').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                address: document.getElementById('address').value,
                notes: document.getElementById('notes').value
            };

            // Initialize Supabase ONLY when needed (Safer)
            let supabase;
            try {
                if (window.supabase) {
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                } else {
                    throw new Error("Supabase SDK not loaded");
                }
                
                const { error } = await supabase.from('orders').insert([formData]);
                if (error) throw error;
                
                alert("Order Placed Successfully!");
                window.location.href = "index.html";

            } catch (err) {
                console.error("Submission Error:", err);
                alert("Order Failed: " + err.message + "\n\nPlease check your internet connection.");
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
