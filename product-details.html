<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | NAYNA</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#0f766e;--bg:#f3f4f6;--text:#111827;--surface:#fff;--radius:12px;}
        *{box-sizing:border-box;margin:0;padding:0}body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
        a{text-decoration:none;color:inherit}
        .container{max-width:1200px;margin:0 auto;padding:0 1.5rem}
        
        /* Nav */
        .navbar{background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);padding:1rem 0;border-bottom:1px solid #e5e7eb;position:sticky;top:0;z-index:100}
        .nav-content{display:flex;justify-content:space-between;align-items:center}
        .logo{font-weight:800;font-size:1.5rem;color:var(--primary)}
        
        /* Layout */
        .details-grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;margin-top:2rem;background:var(--surface);padding:3rem;border-radius:var(--radius);box-shadow:0 4px 6px -1px rgba(0,0,0,0.05)}
        
        /* Images */
        .main-image{height:400px;background:#f9fafb;border-radius:var(--radius);border:1px solid #e5e7eb;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:1rem}
        .main-image img{width:100%;height:100%;object-fit:contain}
        .thumbs{display:flex;gap:1rem}
        .thumb{width:80px;height:80px;border-radius:8px;border:2px solid transparent;cursor:pointer;object-fit:cover;background:#f9fafb}
        .thumb:hover, .thumb.active{border-color:var(--primary)}

        /* Info */
        h1{font-size:2.5rem;margin-bottom:0.5rem;line-height:1.2}
        .price{color:var(--primary);font-weight:700;font-size:1.5rem;margin-bottom:2rem;display:inline-block;background:#f0fdfa;padding:0.25rem 1rem;border-radius:99px}
        
        h3{margin:1.5rem 0 0.5rem;font-size:1.1rem}
        .desc{color:#4b5563;font-size:1.05rem}
        .features{list-style:none;margin-bottom:2.5rem}
        .features li{padding:0.5rem 0;border-bottom:1px solid #f3f4f6;display:flex;gap:0.5rem;align-items:center}
        .features li::before{content:"✓";color:var(--primary);font-weight:bold}

        .btn{display:block;width:100%;padding:1.25rem;background:var(--primary);color:#fff;text-align:center;border-radius:8px;font-weight:700;font-size:1.1rem;transition:0.2s}
        .btn:hover{background:#0d9488;transform:translateY(-2px)}

        @media(max-width:800px){.details-grid{grid-template-columns:1fr;padding:1.5rem}}
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">NAYNA</a>
            <a href="index.html" style="font-weight:600;color:#6b7280">← Back to Catalog</a>
        </div>
    </nav>

    <div class="container">
        <div class="details-grid">
            <div>
                <div class="main-image" id="main-img-wrap">
                    </div>
                <div class="thumbs" id="thumb-wrap">
                    </div>
            </div>

            <div>
                <h1 id="p-name">Loading...</h1>
                <div class="price">Wholesale Pricing</div>
                
                <h3>Description</h3>
                <p id="p-desc" class="desc">Loading description...</p>
                
                <h3>Key Features</h3>
                <ul id="p-features" class="features"></ul>
                
                <a id="btn-order" href="#" class="btn">Place Bulk Order</a>
                <p style="text-align:center;margin-top:1rem;font-size:0.9rem;color:#6b7280">Minimum order quantity: 50 units</p>
            </div>
        </div>
    </div>

    <script>
        // 1. PRODUCT DATABASE
        const products = {
            'dishwash-gel-700g': { 
                name: 'Dishwash Gel 700g', 
                desc: 'Our flagship 700g tub. High-power grease cutting formula with a pleasant lime scent.', 
                features: ['5x Grease Cutting Action', 'Lime Fresh Scent', 'Skin Friendly pH', '12 x 700g in a packege'], 
                images: ['images/700g.jpg', 'images/700g-2.jpg'] 
            },
            'dishwash-gel-400g': { 
                name: 'Dishwash Gel 400g', 
                desc: 'Compact 400g variant suitable for retail shelves and smaller households.', 
                features: ['Compact Size', 'Powerful Formula', 'Leak-proof Seal', 'Affordable'], 
                images: [] 
            },
            'dishwash-soap': { 
                name: 'Dishwash Soap Bar', 
                desc: 'Traditional hard soap bar that lasts long and cleans effectively.', 
                features: ['Long Lasting', 'Anti-soggy Formula', 'High Foaming', 'Lemon Power'], 
                images: ['images/700g.jpg'] 
            },
            'stainless-scrubber': { 
                name: 'Stainless Steel Scrubber', 
                desc: 'Heavy-duty stainless steel coiled scrubber for burnt-on food and grills.', 
                features: ['Rust Free Steel', 'Soft on Hands', 'Heavy Duty Cleaning', 'Durable Coil'], 
                images: ['images/700g.jpg'] 
            },
            'plastic-scrubber': { 
                name: 'Plastic Scrubber', 
                desc: 'Non-scratch colorful scrub pads for delicate cookware and glass.', 
                features: ['Scratch Free', 'Safe for Non-Stick', 'Long Lasting Mesh', 'Vibrant Colors'], 
                images: ['images/700g.jpg'] 
            }
        };

        // 2. PAGE LOGIC
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const product = products[id];

        if(product) {
            // Update Text
            document.title = product.name + " | NAYNA";
            document.getElementById('p-name').innerText = product.name;
            document.getElementById('p-desc').innerText = product.desc;
            
            // Link to Order Page with ID
            document.getElementById('btn-order').href = `order.html?product=${id}`;

            // Features Loop
            const featureList = document.getElementById('p-features');
            product.features.forEach(f => {
                featureList.innerHTML += `<li>${f}</li>`;
            });

            // Image Logic
            const mainWrap = document.getElementById('main-img-wrap');
            const thumbWrap = document.getElementById('thumb-wrap');

            if(product.images.length > 0) {
                // Real Images
                mainWrap.innerHTML = `<img src="${product.images[0]}" alt="${product.name}">`;
                product.images.forEach((img, idx) => {
                    thumbWrap.innerHTML += `<img src="${img}" class="thumb ${idx===0?'active':''}" onclick="changeImage('${img}', this)">`;
                });
            } else {
                // Placeholder
                mainWrap.innerHTML = `<div style="color:#9ca3af;font-weight:600">${product.name}</div>`;
            }
        } else {
            document.querySelector('.details-grid').innerHTML = "<h1>Product not found. <a href='index.html'>Go Back</a></h1>";
        }

        function changeImage(src, thumb) {
            document.querySelector('#main-img-wrap img').src = src;
            document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
            thumb.classList.add('active');
        }
    </script>
</body>
</html>
